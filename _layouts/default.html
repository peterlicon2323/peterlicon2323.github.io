<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/syntax_highlight.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  {% feed_meta %}
  {% seo %}
</head>
<body class="bg-gray-100 font-sans text-gray-900">
  <!-- Navigation -->
  <nav class="bg-white shadow-sm">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-gray-900">Your Name</a>
      <ul class="flex space-x-6">
        <li><a href="/" class="text-gray-700 hover:text-blue-600">Home</a></li>
        <li><a href="/blog" class="text-gray-700 hover:text-blue-600">Blog</a></li>
        <li><a href="/assets/files/cv.pdf" class="text-gray-700 hover:text-blue-600">CV</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="bg-white shadow-sm mt-12">
    <div class="container mx-auto px-4 py-6 text-center text-gray-600">
      <p>&copy; {{ 'now' | date: '%Y' }} Your Name. All rights reserved.</p>
      <div class="flex justify-center space-x-4 mt-2">
        <a href="{{ site.author.github }}" target="_blank"><img src="/assets/img/github_icon_light.png" alt="GitHub" class="w-5 h-5"></a>
        <a href="{{ site.author.linkedin }}" target="_blank"><img src="/assets/img/linkedin_icon_light.png" alt="LinkedIn" class="w-5 h-5"></a>
        <a href="mailto:{{ site.author.email }}"><img src="/assets/img/email_icon_light.png" alt="Email" class="w-5 h-5"></a>
      </div>
    </div>
  </footer>
</body>
</html>
