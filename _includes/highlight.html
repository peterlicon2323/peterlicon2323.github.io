<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css" media="screen and (prefers-color-scheme: light)">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css" media="screen and (prefers-color-scheme: dark)">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js" async></script>
<style>
    .code-container {
        position: relative;
    }
    
    .highlighter-rouge {
        border: none !important;
    }

    [data-theme="dark"] .highlighter-rouge {
        border: none !important;
    }
    
    .copy-button {
        position: absolute;
        top: 1px;
        right: 1px;
        background: transparent;
        color: var(--icon-fill);
        border: none;
        padding: 1px 1px;
        cursor: pointer;
        border-radius: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
    }
    .copy-button:hover {
        background: transparent;
        color: var(--icon-fill-hover);
    }
    
    .copy-button svg {
        width: 16px;
        height: 16px;
        fill: var(--icon-fill); /* Use custom property for SVG fill */
    }
    .copy-button:hover svg {
        fill: var(--icon-fill-hover); /* Use custom property for SVG fill on hover */
    }
    
    /* Remove border from Highlight.js code blocks */
    pre.highlight.code-container {
        border: none !important; /* Override any border from Highlight.js themes */
        background: var(--light-card) !important; /* Enforce light mode card color */
        padding: 8px !important;
    }
    code {
        border: none !important; /* Ensure no border on code */
        background: transparent !important; /* Prevent code from overriding pre background */
        padding: 8px !important;
    }
    [data-theme="dark"] pre.highlight.code-container {
        border: none !important; /* Ensure no border in dark mode */
        background: var(--dark-card) !important; /* Enforce dark mode card color */
        padding: 8px !important;
    }
    [data-theme="dark"] code {
        border: none !important; /* Ensure no border in dark mode */
        background: transparent !important; /* Prevent code from overriding pre background */
        padding: 8px !important;
    }

    /*Block Quote Styling */
    blockquote {
        margin: 1em 0;
        padding: 1em;
        border-left: 4px solid;
        border-radius: 4px;
        background-color: var(--light-bg);
    }
    blockquote.warning {
        border-left-color: #ffcc00;
        background-color: #fff3cd;
    }
    blockquote.warning p:first-child::before {
        content: "Warning: ";
        font-weight: bold;
        color: #856404;
    }
    [data-theme="dark"] blockquote {
        background-color: var(--dark-bg);
    }
    [data-theme="dark"] blockquote.warning {
        border-left-color: #ffcc00;
        background-color: #664d00;
    }
    [data-theme="dark"] blockquote.warning p:first-child::before {
        color: #ffcc00;
    }
    blockquote p {
        margin: 0;
    }
    blockquote p:first-child {
        margin-bottom: 0.5em;
    }
</style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        hljs.highlightAll();
        document.querySelectorAll('pre code').forEach(block => {
            const container = block.parentElement;
            container.classList.add('code-container');
            const button = document.createElement('button');
            button.classList.add('copy-button');
            button.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>';
            container.appendChild(button);
            button.addEventListener('click', () => {
                const clipboard = new ClipboardJS(button, {
                    text: () => block.textContent
                });
                clipboard.on('success', () => {
                    button.textContent = 'Copied!';
                    setTimeout(() => {
                        button.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>';
                    }, 2000);
                    clipboard.destroy();
                });
            });
        });
    });
</script>
